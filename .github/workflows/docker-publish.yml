# .github/workflows/docker-publish.yml
# Build et push de l'image du service "app" (Laravel/PHP-FPM) uniquement.
# Les autres services (nginx, mysql, redis) utilisent des images officielles déjà sur Docker Hub.
#
# Tags produits :
# - Push sur main → main, sha-xxxxx (+ buildcache pour le cache)
# - Push d'un tag v1.0.0 → v1.0.0, 1.0.0, 1.0, sha-xxxxx

name: Publish Docker Image

on:
  push:
    branches: [ master ]
    tags: [ 'v*.*.*' ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/task-manager-app
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern=v{{version}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

     