name: Laravel CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    # Service MySQL pour les tests de base de données
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: task_manager_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    strategy:
      matrix:
        php-version: ["8.2"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, xml, ctype, iconv, mysqlnd, dom, curl
          coverage: xdebug # Nécessaire pour le rapport de couverture à 70%

      - name: Cache Vendor
        uses: actions/cache@v3
        with:
          path: vendor/
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}

      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress

      - name: Prepare Laravel Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Database Migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: task_manager_test
          DB_USERNAME: root

      - name: Run Tests with Coverage
        run: php artisan test --coverage-clover=coverage.xml --min=70
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: task_manager_test
          DB_USERNAME: root

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse

      - name: Run PHP CS Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff
